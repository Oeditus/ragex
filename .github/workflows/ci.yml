name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.19'
  OTP_VERSION: '28'

jobs:
  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}

    - name: Restore dependencies cache
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libgit2-dev

    - name: Install dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: mix deps.get

    - name: Compile dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: mix deps.compile

  compile:
    name: Compile
    needs: deps
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}

    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libgit2-dev

    - name: Compile (warnings as errors)
      run: mix compile --warnings-as-errors

  credo:
    name: Credo
    needs: deps
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}

    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

    - name: Run Credo (strict mode)
      run: mix credo --strict

  test:
    name: Test
    needs: deps
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}

    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libgit2-dev

    - name: Install Ruby parser gem
      run: gem install --user-install parser

    - name: Run tests with coverage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: mix coveralls.github --exclude resource_intensive

  analysis:
    name: Diff Analysis
    if: github.event_name == 'pull_request'
    needs: deps
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}

    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libgit2-dev

    - name: Run diff analysis
      run: mix ragex.ci --base origin/${{ github.base_ref }} --format github

  ci:
    name: CI
    needs: [compile, credo, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Check job results
      run: |
        if [ "${{ needs.compile.result }}" != "success" ] || \
           [ "${{ needs.credo.result }}" != "success" ] || \
           [ "${{ needs.test.result }}" != "success" ]; then
          echo "One or more jobs failed"
          exit 1
        fi
